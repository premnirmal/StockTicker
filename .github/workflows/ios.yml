name: iOS

on:
  pull_request:
    branches:
      - 'master'
  push:
    branches:
      - 'master'

jobs:
  ios:
    name: Build iOS framework, app & run shared tests
    # The Kotlin/Native iOS targets (and the simulator test run / xcodebuild)
    # require a macOS host with Xcode, so this job runs on a macOS runner —
    # unlike the Android build/test jobs which run on ubuntu. The runner image
    # is pinned (rather than macos-latest) so the Xcode / Kotlin-Native
    # toolchain stays reproducible. macos-26 (Xcode 26) is required because
    # Compose Multiplatform 1.11's Kotlin/Native artifacts (ui-uikit) reference
    # symbols that only exist in the iOS 26 SDK (e.g. UIViewLayoutRegion and the
    # UIUtilities framework). Linking the simulator test executable against the
    # older iOS 18.5 SDK (Xcode 16.4 on macos-15) fails with
    # "Undefined symbols ... _OBJC_CLASS_$_UIViewLayoutRegion".
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 brings the git tags so app/build.gradle.kts can
          # derive the version via `git describe --tags`.
          fetch-depth: 0
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Compile shared common code
        run: ./gradlew :shared:compileKotlinMetadata --no-daemon
      - name: Link iOS framework (simulator)
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --no-daemon
      - name: Link iOS framework (device)
        run: ./gradlew :shared:linkDebugFrameworkIosArm64 --no-daemon
      - name: Run shared tests on iOS simulator
        run: ./gradlew :shared:iosSimulatorArm64Test --no-daemon
      - name: Archive iOS test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: shared/build/test-results/iosSimulatorArm64Test/
      # The Xcode project is intentionally not committed (see iosApp/README.md);
      # it is generated from iosApp/project.yml with XcodeGen. The generated
      # project wires a Gradle run-script phase
      # (:shared:embedAndSignAppleFrameworkForXcode) that builds the shared
      # Kotlin/Native framework the app + widget link against.
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: iosApp
        # Source version.sh first so XcodeGen can expand ${MARKETING_VERSION} /
        # ${CURRENT_PROJECT_VERSION} in project.yml from the latest git tag
        # (mirroring the Android version derivation). fetch-depth: 0 above brings
        # the tags this needs.
        run: |
          source ./version.sh
          xcodegen generate
      - name: Install iOS platform
        # The macos-26 image ships Xcode 26 with the iOS 26 SDK (enough for the
        # Gradle Kotlin/Native framework link + the SPM package graph to resolve),
        # but it does NOT pre-install the iOS 26 *platform* support (device build
        # support + simulator runtime). Without it every xcodebuild destination
        # fails with "iOS 26.0 is not installed. Please download and install the
        # platform from Xcode > Settings > Components." `-downloadPlatform iOS`
        # installs it on demand for the selected Xcode so the app can be built.
        run: sudo xcodebuild -downloadPlatform iOS
      - name: Build iOS app (simulator, no code signing)
        # Build for the iOS Simulator (no code signing needed). The iOS platform —
        # including the simulator runtime — is installed by the previous step, so
        # the generic simulator destination resolves. A generic destination needs
        # no specific simulator device to be created/booted.
        run: |
          xcodebuild build \
            -project iosApp/StockTicker.xcodeproj \
            -scheme StocksWidget \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
