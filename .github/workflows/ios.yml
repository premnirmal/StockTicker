name: iOS

on:
  pull_request:
    branches:
      - 'master'
  push:
    branches:
      - 'master'

jobs:
  ios:
    name: Build iOS framework, app & run shared tests
    # The Kotlin/Native iOS targets (and the simulator test run / xcodebuild)
    # require a macOS host with Xcode, so this job runs on a macOS runner —
    # unlike the Android build/test jobs which run on ubuntu. The runner image
    # is pinned (rather than macos-latest) so the Xcode / Kotlin-Native
    # toolchain stays reproducible.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 brings the git tags so app/build.gradle.kts can
          # derive the version via `git describe --tags`.
          fetch-depth: 0
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Compile shared common code
        run: ./gradlew :shared:compileKotlinMetadata --no-daemon
      - name: Link iOS framework (simulator)
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --no-daemon
      - name: Link iOS framework (device)
        run: ./gradlew :shared:linkDebugFrameworkIosArm64 --no-daemon
      - name: Run shared tests on iOS simulator
        run: ./gradlew :shared:iosSimulatorArm64Test --no-daemon
      - name: Archive iOS test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: shared/build/test-results/iosSimulatorArm64Test/
      # The Xcode project is intentionally not committed (see iosApp/README.md);
      # it is generated from iosApp/project.yml with XcodeGen. The generated
      # project wires a Gradle run-script phase
      # (:shared:embedAndSignAppleFrameworkForXcode) that builds the shared
      # Kotlin/Native framework the app + widget link against.
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate
      - name: Build iOS app (simulator, no code signing)
        run: |
          xcodebuild build \
            -project iosApp/StockTicker.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO
