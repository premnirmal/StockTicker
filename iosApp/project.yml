# XcodeGen spec for the StockTicker iOS app.
#
# The `.xcodeproj` is intentionally NOT committed — it is generated on demand
# (locally or in CI) from this declarative spec, which avoids the fragile,
# merge-conflict-prone `project.pbxproj`. Generate it with:
#
#   brew install xcodegen          # one-time
#   cd iosApp && xcodegen generate # produces iosApp/StockTicker.xcodeproj
#
# The shared Kotlin/Native `Shared.framework` is built by Gradle via the
# standard KMP `embedAndSignAppleFrameworkForXcode` run-script phase below, so
# no framework binary needs to be committed either.
name: StockTicker

options:
  bundleIdPrefix: com.github.premnirmal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    # Default app/extension version. These back CFBundleShortVersionString
    # ($(MARKETING_VERSION)) and CFBundleVersion ($(CURRENT_PROJECT_VERSION)) in
    # every target's Info.plist. They MUST be non-empty: an app extension whose
    # CFBundleVersion resolves to an empty string fails to install with
    # "bundleVersion must be set in placeholder attributes for an app extension
    # placeholder" (IXErrorDomain).
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # The shared framework is a static Kotlin/Native framework, so it only has
    # to be on the linker search path — it is not embedded.
    FRAMEWORK_SEARCH_PATHS:
      - $(inherited)
      - $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.github.premnirmal.ticker
        INFOPLIST_FILE: iosApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: iosApp/StockTicker.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Allow the Gradle run-script phase below to write the framework into
        # the build directory (script sandboxing would otherwise block it).
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - Shared
    dependencies:
      - target: StockTickerWidget
    preBuildScripts:
      - name: Compile Kotlin/Native framework
        # Always run so the framework is rebuilt when the shared code changes.
        basedOnDependencyAnalysis: false
        script: |
          # Xcode build phases run with a minimal environment that does NOT source
          # your shell profile, so a JDK on your interactive PATH is invisible here
          # (Gradle then fails with "Unable to locate a Java Runtime"). Load
          # JAVA_HOME from .xcode.env (committed default) and the optional,
          # uncommitted .xcode.env.local (your machine-specific override).
          if [ -f "$SRCROOT/.xcode.env" ]; then source "$SRCROOT/.xcode.env"; fi
          if [ -f "$SRCROOT/.xcode.env.local" ]; then source "$SRCROOT/.xcode.env.local"; fi
          if [ -z "$JAVA_HOME" ] || [ ! -x "$JAVA_HOME/bin/java" ]; then
            echo "error: Could not locate a Java runtime (JAVA_HOME is unset or invalid)." >&2
            echo "error: Install a JDK 17+ and/or set JAVA_HOME in iosApp/.xcode.env.local, e.g.:" >&2
            echo "error:   echo 'export JAVA_HOME=\$(/usr/libexec/java_home -v 17)' > iosApp/.xcode.env.local" >&2
            exit 1
          fi
          export PATH="$JAVA_HOME/bin:$PATH"
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode

  StockTickerWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: StockTickerWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.github.premnirmal.ticker.StockTickerWidget
        INFOPLIST_FILE: StockTickerWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: StockTickerWidget/StockTickerWidget.entitlements
        # Allow the Gradle run-script phase below to write the framework into
        # the build directory (script sandboxing would otherwise block it).
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - Shared
    preBuildScripts:
      - name: Compile Kotlin/Native framework
        basedOnDependencyAnalysis: false
        script: |
          # See the iosApp target's run-script phase: Xcode build phases run with a
          # minimal environment, so load JAVA_HOME from .xcode.env(.local) before
          # invoking Gradle, otherwise it fails with "Unable to locate a Java Runtime".
          if [ -f "$SRCROOT/.xcode.env" ]; then source "$SRCROOT/.xcode.env"; fi
          if [ -f "$SRCROOT/.xcode.env.local" ]; then source "$SRCROOT/.xcode.env.local"; fi
          if [ -z "$JAVA_HOME" ] || [ ! -x "$JAVA_HOME/bin/java" ]; then
            echo "error: Could not locate a Java runtime (JAVA_HOME is unset or invalid)." >&2
            echo "error: Install a JDK 17+ and/or set JAVA_HOME in iosApp/.xcode.env.local, e.g.:" >&2
            echo "error:   echo 'export JAVA_HOME=\$(/usr/libexec/java_home -v 17)' > iosApp/.xcode.env.local" >&2
            exit 1
          fi
          export PATH="$JAVA_HOME/bin:$PATH"
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
